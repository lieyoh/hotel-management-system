{% extends "mysite/index.html" %}

{% block content %}
<div class="max-w-2xl mx-auto mt-8 mb-4 px-4 md:px-0">
    <a href="javascript:history.back()" 
       class="inline-flex items-center text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 hover:text-red-600 transition-all duration-300 group">
        <span>Go Back</span>
    </a>
</div>
<div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
    <h2 class="text-2xl font-bold text-gray-900 mb-6">Add New Room</h2>
    
    <form method="POST" class="space-y-6">
        {% csrf_token %}
        
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Room Number</label>
            {{ form.number }}
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Room Category (Type)</label>
            {{ form.category }}
            <p class="text-xs text-gray-400 mt-1">Select from existing Room Types</p>
        </div>

        <div class="flex items-center gap-3">
            {{ form.is_available }}
            <label class="text-sm font-medium text-gray-700">Set as Available</label>
        </div>
        
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Select A Reason</label>
            {{ form.reason }}
            <label class="text-xs text-gray-400 mt-1">Select from Reasons</label>
        </div>
        
        <div class="pt-4 flex gap-4">
            <button type="submit" class="bg-red-600 text-white px-8 py-2 rounded-xl font-bold hover:bg-red-700 transition-all">
                Create Room
            </button>
            <a href="{% url 'room-list' %}" class="px-6 py-2 text-gray-500 font-medium hover:text-gray-700">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

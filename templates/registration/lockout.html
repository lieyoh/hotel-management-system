<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-4 text-center">
    <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm">
        <div class="text-red-500 mb-4 text-5xl">
            <i class="fas fa-user-lock"></i>
        </div>
        <h1 class="text-2xl font-bold text-slate-800 mb-2">Account Locked</h1>
        <p class="text-slate-600 mb-6 text-sm">
            Too many failed login attempts. For security, your access has been temporarily locked.
        </p>
        <p class="text-xs text-slate-400">Please try again after 1 hour or contact the Admin.</p>
        <a href="{% url 'users:login' %}" class="mt-6 inline-block text-blue-600 font-bold hover:underline">Back to Login</a>
    </div>
</body>
</html>

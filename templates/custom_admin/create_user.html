{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow-md">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">Create New User</h2>
    
    <form method="POST" class="space-y-4">
        {% csrf_token %}
        
        {% for field in form %}
        <div class="mb-4">
            <label class="block text-sm font-semibold text-gray-700 mb-1">
                {{ field.label }}
            </label>
            
            {% if field.name == 'role' %}
                <select name="{{ field.name }}" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none border-gray-300 bg-white">
                    {% for value, text in field.field.choices %}
                        <option value="{{ value }}">{{ text }}</option>
                    {% endfor %}
                </select>
            {% else %}
                <input type="{{ field.field.widget.input_type }}" 
                    name="{{ field.name }}" 
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none border-gray-300">
            {% endif %}

            {% if field.errors %}
                <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
            {% endif %}
        </div>
        {% endfor %}

        <div class="flex items-center justify-end mt-6">
            <a href="{% url 'users:admin_dashboard' %}" class="text-gray-600 mr-4 hover:underline">Cancel</a>
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition">
                Create User
            </button>
        </div>
    </form>
</div>
{% endblock %}
